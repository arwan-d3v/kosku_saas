name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-lint-web:
    name: Build Next.js Web App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: apps/**/package.json

      - name: Install Web Dependencies
        working-directory: apps/web
        run: npm install

      - name: Lint Web
        working-directory: apps/web
        run: npm run lint

      - name: Build Web
        working-directory: apps/web
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

  build-and-lint-api:
    name: Build NestJS API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: apps/**/package.json

      - name: Install API Dependencies
        working-directory: apps/api
        run: npm install

      - name: Lint API
        working-directory: apps/api
        run: npm run lint

      - name: Build API
        working-directory: apps/api
        run: npm run build

  deploy-warning:
    name: Deployment Note
    runs-on: ubuntu-latest
    needs: [build-and-lint-web, build-and-lint-api]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Note
        run: echo "Deployment is handled automatically by Vercel (for frontend) and Render/Railway (for backend) upon successful push to main."
